<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MTEC Blender Bridge flödesschema</title>
  <desc id="desc">Flödesschema som visar hur VS Code och Codex kommunicerar via en extern MCP-server till en Blender-bridge och vidare till Blender bpy.</desc>

  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #44576b; }
      .box { fill: #ffffff; stroke: #1f3b5b; stroke-width: 3; rx: 18; ry: 18; }
      .boxAlt { fill: #eef5ff; stroke: #295a92; stroke-width: 3; rx: 18; ry: 18; }
      .textHead { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #13283f; }
      .textBody { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #23384f; }
      .small { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #3f556c; }
      .arrow { stroke: #295a92; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .label { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #295a92; }
      .footer { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #4f657c; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#295a92"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1c2a38" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>

  <text class="title" x="800" y="70" text-anchor="middle">MTEC Blender Bridge + MTECCodexMCP</text>
  <text class="subtitle" x="800" y="105" text-anchor="middle">Flödesschema över kommunikationsvägen mellan agent, MCP-server, Blender-bridge och bpy</text>

  <!-- Boxes -->
  <g filter="url(#shadow)">
    <rect class="boxAlt" x="90" y="280" width="300" height="170" rx="18" ry="18"/>
    <rect class="box" x="470" y="280" width="300" height="170" rx="18" ry="18"/>
    <rect class="boxAlt" x="850" y="280" width="300" height="170" rx="18" ry="18"/>
    <rect class="box" x="1230" y="280" width="280" height="170" rx="18" ry="18"/>
  </g>

  <!-- Box 1 -->
  <text class="textHead" x="240" y="330" text-anchor="middle">VS Code + Codex</text>
  <text class="textBody" x="240" y="365" text-anchor="middle">eller annan agent</text>
  <text class="small" x="240" y="403" text-anchor="middle">Användaren skriver prompt</text>
  <text class="small" x="240" y="426" text-anchor="middle">och agenten gör tool-anrop</text>

  <!-- Box 2 -->
  <text class="textHead" x="620" y="322" text-anchor="middle">mtec_codex_mcp_server.py</text>
  <text class="textBody" x="620" y="360" text-anchor="middle">Extern MCP-server</text>
  <text class="small" x="620" y="397" text-anchor="middle">Körs i vanlig Python-miljö</text>
  <text class="small" x="620" y="420" text-anchor="middle">Översätter MCP ↔ HTTP</text>

  <!-- Box 3 -->
  <text class="textHead" x="1000" y="322" text-anchor="middle">MTECBlenderBridge.py</text>
  <text class="textBody" x="1000" y="360" text-anchor="middle">Blender-addon / lokal bridge</text>
  <text class="small" x="1000" y="397" text-anchor="middle">HTTP-API inne i Blender</text>
  <text class="small" x="1000" y="420" text-anchor="middle">Mappar anrop till Blender-logik</text>

  <!-- Box 4 -->
  <text class="textHead" x="1370" y="330" text-anchor="middle">Blender bpy</text>
  <text class="textBody" x="1370" y="365" text-anchor="middle">Blender Python API</text>
  <text class="small" x="1370" y="403" text-anchor="middle">Scen, objekt, material,</text>
  <text class="small" x="1370" y="426" text-anchor="middle">modifierare, render, export</text>

  <!-- Arrows -->
  <line class="arrow" x1="390" y1="365" x2="470" y2="365"/>
  <line class="arrow" x1="770" y1="365" x2="850" y2="365"/>
  <line class="arrow" x1="1150" y1="365" x2="1230" y2="365"/>

  <text class="label" x="430" y="345" text-anchor="middle">MCP via stdio</text>
  <text class="label" x="810" y="345" text-anchor="middle">HTTP localhost</text>
  <text class="label" x="1190" y="345" text-anchor="middle">bpy-anrop</text>

  <!-- Return path -->
  <path class="arrow" d="M1370,470 C1370,590 240,590 240,470"/>
  <text class="label" x="800" y="625" text-anchor="middle">Resultat / status / fel tillbaka samma väg</text>

  <!-- Footer notes -->
  <rect x="150" y="690" width="1300" height="120" fill="#ffffff" stroke="#c7d3e3" stroke-width="2" rx="16" ry="16"/>
  <text class="textHead" x="180" y="730">Nyckelidé</text>
  <text class="footer" x="180" y="760">Blender slipper bära hela MCP- och beroendekedjan. Den exponerar bara en lokal bridge, medan extern agentlogik ligger utanför Blender.</text>
  <text class="footer" x="180" y="788">Samma bridge kan i princip användas av Codex, andra MCP-klienter eller egna agenter som pratar HTTP direkt.</text>
</svg>
